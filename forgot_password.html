<!-- templates/forgot_password.html -->
{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-key"></i>
            <h2>Reset Password</h2>
            <p>Enter your email to receive reset instructions</p>
        </div>
        <form method="POST" action="{{ url_for('forgot_password') }}" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" placeholder="Enter your registered email" required>
            </div>
            <button type="submit" class="btn-primary btn-block">Send Reset Link <i class="fas fa-paper-plane"></i></button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}"><i class="fas fa-arrow-left"></i> Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
