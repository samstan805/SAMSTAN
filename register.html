<!-- templates/register.html -->
{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-graduation-cap"></i>
            <h2>Create Account</h2>
            <p>Join the electronic library system</p>
        </div>
        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label><i class="fas fa-user"></i> Full Name</label>
                <input type="text" name="name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-lock"></i> Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label><i class="fas fa-user-tag"></i> Select Role</label>
                <div class="radio-group">
                    <label class="radio-label"><input type="radio" name="role" value="Admin" required> <span>Admin</span></label>
                    <label class="radio-label"><input type="radio" name="role" value="Librarian" required> <span>Librarian</span></label>
                    <label class="radio-label"><input type="radio" name="role" value="Student" required> <span>Student</span></label>
                </div>
            </div>
            <button type="submit" class="btn-primary btn-block">Register <i class="fas fa-check"></i></button>
        </form>
        <div class="auth-footer">
            <a href="{{ url_for('login') }}"><i class="fas fa-sign-in-alt"></i> Already have an account? Login</a>
        </div>
    </div>
</div>
{% endblock %}
